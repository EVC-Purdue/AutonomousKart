<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kart Sim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; color:#c8c8d0; font-family:'JetBrains Mono',monospace; overflow:hidden; height:100vh; }
  canvas { display:block; }
  #hud {
    position:fixed; top:16px; left:16px;
    background:rgba(10,10,15,0.85); border:1px solid #222;
    padding:12px 16px; border-radius:6px; font-size:12px; line-height:1.8;
    min-width:220px; backdrop-filter:blur(8px);
  }
  #hud .label { color:#666; }
  #hud .val { color:#e0e0e0; font-weight:700; }
  #costs {
    position:fixed; bottom:16px; right:16px;
    background:rgba(10,10,15,0.85); border:1px solid #222;
    padding:12px 14px; border-radius:6px; font-size:11px; line-height:1.5;
    min-width:360px; backdrop-filter:blur(8px);
  }
  #costs .title { color:#888; font-weight:700; margin-bottom:6px; letter-spacing:1px; }
  #costs .meta { color:#555; margin-bottom:6px; font-size:10px; }
  #costs table { width:100%; border-collapse:collapse; }
  #costs td { padding:1px 4px; vertical-align:middle; }
  #costs td.name { color:#888; width:96px; white-space:nowrap; }
  #costs td.bar { width:100%; }
  #costs td.val { color:#e0e0e0; text-align:right; font-variant-numeric:tabular-nums; width:64px; white-space:nowrap; }
  #costs .barfill { height:6px; background:#60a5fa; border-radius:2px; }
  #costs .barfill.neg { background:#4ade80; }
  #costs .empty { color:#444; font-style:italic; }
  #hud .state { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:700; }
  #hud .state.IDLE { background:#333; color:#888; }
  #hud .state.MANUAL { background:#1a3a1a; color:#4ade80; }
  #hud .state.AUTONOMOUS { background:#1a2a4a; color:#60a5fa; }
  #hud .state.STOPPED { background:#3a1a1a; color:#f87171; }
  #status {
    position:fixed; top:16px; right:16px;
    font-size:11px; padding:6px 12px; border-radius:4px;
  }
  #status.ok { background:#0a1a0a; color:#4ade80; border:1px solid #1a3a1a; }
  #status.err { background:#1a0a0a; color:#f87171; border:1px solid #3a1a1a; }
  #controls {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    font-size:11px; color:#555; text-align:center;
  }
  #controls button {
    background:#1a1a22; color:#aaa; border:1px solid #333;
    padding:4px 12px; margin-right:4px; border-radius:3px;
    font-family:inherit; font-size:11px; cursor:pointer;
  }
  #controls button:hover { border-color:#555; color:#fff; }
  #residual {
    position:fixed; bottom:16px; left:16px;
    background:rgba(10,10,15,0.85); border:1px solid #222;
    padding:12px 14px; border-radius:6px; font-size:11px; line-height:1.6;
    min-width:240px; backdrop-filter:blur(8px);
  }
  #residual .title { color:#888; font-weight:700; margin-bottom:6px; letter-spacing:1px; }
  #residual .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  #residual .row .label { color:#666; }
  #residual .row .val { color:#e0e0e0; font-variant-numeric:tabular-nums; }
  #residual .mode { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:700; }
  #residual .mode.OFF    { background:#333; color:#888; }
  #residual .mode.SHADOW { background:#2a2210; color:#facc15; }
  #residual .mode.APPLY  { background:#1a3a1a; color:#4ade80; }
  #residual .arrow       { color:#444; margin:0 4px; }
  #residual .err-better  { color:#4ade80; }
  #residual .err-worse   { color:#f87171; }
  #residual #res-spark   { display:block; margin-top:6px; background:#070710; border-radius:2px; }
  #residual .btn-row     { display:flex; gap:4px; margin-top:8px; }
  #residual .btn-row button {
    flex:1; background:#1a1a22; color:#aaa; border:1px solid #333;
    padding:4px 6px; border-radius:3px; font-family:inherit; font-size:10px; cursor:pointer;
    letter-spacing:1px;
  }
  #residual .btn-row button.active { border-color:#4ade80; color:#fff; background:#1a2a1a; }
  #residual .btn-row button.flash  { border-color:#f87171; background:#3a1a1a; color:#fff; }
  #residual .btn-row button:hover  { border-color:#555; color:#fff; }
  #residual .section-lbl { color:#666; font-size:10px; letter-spacing:1.5px; margin-top:10px; }
  #residual .line-row { display:flex; gap:4px; margin-top:6px; align-items:center; }
  #residual select, #residual input[type="text"] {
    background:#1a1a22; color:#c8c8d0; border:1px solid #333;
    padding:4px 6px; border-radius:3px;
    font-family:inherit; font-size:10px;
    min-width:0;
  }
  #residual select { flex:0 0 96px; }
  #residual input[type="text"] { flex:1 1 auto; width:60px; }
  #residual select:focus, #residual input[type="text"]:focus { outline:none; border-color:#555; }
  #residual .line-status { font-size:10px; margin-top:6px; min-height:12px; line-height:1.2; }
  #residual .line-status.ok  { color:#4ade80; }
  #residual .line-status.err { color:#f87171; }
  #residual .hint { color:#444; font-size:10px; margin-top:6px; font-style:italic; line-height:1.3; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div><span class="label">STATE </span><span id="h-state" class="state IDLE">IDLE</span></div>
  <div><span class="label">POS   </span><span id="h-pos" class="val">—</span></div>
  <div><span class="label">YAW   </span><span id="h-yaw" class="val">—</span></div>
  <div><span class="label">SPEED </span><span id="h-spd" class="val">—</span></div>
  <div><span class="label">CMD   </span><span id="h-cmd" class="val">—</span></div>
</div>

<div id="status" class="err">disconnected</div>

<div id="costs">
  <div class="title">MPC COSTS</div>
  <div class="meta" id="cost-meta">awaiting /mpc_status…</div>
  <table id="cost-table"><tbody></tbody></table>
</div>

<div id="controls">
  <div style="margin-bottom:8px;">
    <button onclick="setState('IDLE')">IDLE</button>
    <button onclick="setState('MANUAL')">MANUAL</button>
    <button onclick="setState('AUTONOMOUS')" style="background:#1a2a4a;color:#60a5fa;">AUTO</button>
    <button onclick="setState('STOPPED')" style="background:#3a1a1a;color:#f87171;">STOP</button>
  </div>
  scroll: zoom · drag: pan · R: reset view · WASD/arrows: drive in MANUAL
</div>

<div id="residual">
  <div class="title">MPC RESIDUAL LEARNER</div>
  <div class="row"><span class="label">mode</span><span id="res-mode" class="mode OFF">OFF</span></div>
  <div class="row"><span class="label">samples</span><span id="res-samples" class="val">—</span></div>
  <div class="row"><span class="label">||θ_s||</span><span id="res-theta-s" class="val">—</span></div>
  <div class="row"><span class="label">||θ_d||</span><span id="res-theta-d" class="val">—</span></div>
  <div class="row"><span class="label">ds</span><span class="val"><span id="res-ds-nom">—</span><span class="arrow">→</span><span id="res-ds-res">—</span></span></div>
  <div class="row"><span class="label">dd</span><span class="val"><span id="res-dd-nom">—</span><span class="arrow">→</span><span id="res-dd-res">—</span></span></div>
  <canvas id="res-spark" width="60" height="16"></canvas>
  <div class="btn-row">
    <button id="res-btn-off"    onclick="setResidualMode('off')">OFF</button>
    <button id="res-btn-shadow" onclick="setResidualMode('shadow')">SHADOW</button>
    <button id="res-btn-apply"  onclick="setResidualMode('apply')">APPLY</button>
  </div>

  <div class="section-lbl">PLANNER</div>
  <div class="btn-row">
    <button id="plan-btn-pure_pursuit" title="pure_pursuit" onclick="setPlanner('pure_pursuit')">PP</button>
    <button id="plan-btn-mpc"          title="mpc"          onclick="setPlanner('mpc')">MPC</button>
    <button id="plan-btn-opencv"       title="opencv"       onclick="setPlanner('opencv')">CV</button>
  </div>

  <div class="section-lbl">RACING LINE</div>
  <div class="line-row">
    <select id="line-select">
      <option value="/ws/data/racing_line/line2.csv">line2.csv</option>
      <option value="/ws/data/racing_line/line4.csv">line4.csv</option>
      <option value="/ws/data/racing_line/line6.csv">line6.csv</option>
      <option value="/ws/data/racing_line/line8.csv">line8.csv</option>
      <option value="/ws/data/racing_line/line10.csv">line10.csv</option>
      <option value="/ws/data/racing_line/line12.csv">line12.csv</option>
      <option value="/ws/data/racing_line/line14.csv">line14.csv</option>
      <option value="/ws/data/racing_line/line15.csv">line15.csv</option>
      <option value="/ws/data/racing_line/line16.csv">line16.csv</option>
    </select>
    <input id="line-input" type="text" placeholder="/ws/data/racing_line/...">
    <button id="line-load" onclick="loadLine()">Load</button>
  </div>
  <div id="line-status" class="line-status"></div>
  <div class="hint">Line swap rebuilds planners; residual θ is preserved.</div>
</div>

<script>
const API = `http://${location.hostname || 'localhost'}:8000`;

const C = document.getElementById('c');
const ctx = C.getContext('2d');

// ── State ──
let racingLine = [];
let trail = [];
const MAX_TRAIL = 3000;
let odom = { x:0, y:0, yaw:0, speed:0, motor:0, steer:0, state:'IDLE' };
let connected = false;
let mpcStatus = null;
let dynamicLine = null;  // {active, strategy, merge_idx, points: [[x,y], ...]}

// ── Camera ──
let cam = { x:0, y:0, zoom:4, targetZoom:4 };
let dragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};

// ── Resize ──
function resize() { C.width = innerWidth; C.height = innerHeight; }
addEventListener('resize', resize);
resize();

// ── Input ──
C.addEventListener('wheel', e => {
  e.preventDefault();
  cam.targetZoom *= e.deltaY > 0 ? 0.9 : 1.1;
  cam.targetZoom = Math.max(0.5, Math.min(50, cam.targetZoom));
}, {passive:false});

C.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = {x:e.clientX, y:e.clientY};
  camStart = {x:cam.x, y:cam.y};
});
addEventListener('mousemove', e => {
  if (!dragging) return;
  cam.x = camStart.x + (e.clientX - dragStart.x) / cam.zoom;
  cam.y = camStart.y - (e.clientY - dragStart.y) / cam.zoom;
});
addEventListener('mouseup', () => dragging = false);

// ── Manual driving (WASD / arrow keys, active in MANUAL state) ──
const MANUAL_SPEED_PCT = 30;   // forward throttle %
const MANUAL_STEER_PCT = 60;   // L/R steer %
const heldDriveKeys = new Set();
let manualSendInterval = null;

function isDriveKey(key) {
  return ['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(key);
}

async function sendManual(speed, steer) {
  try {
    await fetch(API + '/manual_control', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({speed, steering: steer}),
    });
  } catch(e) {}
}

function computeManualCmd() {
  let speed = 0, steer = 0;
  if (heldDriveKeys.has('w') || heldDriveKeys.has('arrowup'))    speed += MANUAL_SPEED_PCT;
  if (heldDriveKeys.has('a') || heldDriveKeys.has('arrowleft'))  steer -= MANUAL_STEER_PCT;
  if (heldDriveKeys.has('d') || heldDriveKeys.has('arrowright')) steer += MANUAL_STEER_PCT;
  // 's' / down stops (no reverse on the kart side).
  return { speed, steer };
}

function startManualSending() {
  if (manualSendInterval) return;
  manualSendInterval = setInterval(() => {
    if (odom.state !== 'MANUAL') return;
    const { speed, steer } = computeManualCmd();
    sendManual(speed, steer);
  }, 50);  // 20 Hz — well under the 0.5 s server timeout
}
function stopManualSending() {
  if (!manualSendInterval) return;
  clearInterval(manualSendInterval);
  manualSendInterval = null;
  // Final stop frame so the kart doesn't coast on the last cached value.
  sendManual(0, 0);
}

addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    cam.x = odom.x; cam.y = odom.y; cam.targetZoom = 4;
    return;
  }
  const k = e.key.toLowerCase();
  if (isDriveKey(k)) {
    if (e.repeat) return;     // ignore OS auto-repeat
    heldDriveKeys.add(k);
    startManualSending();
    e.preventDefault();
  }
});
addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (isDriveKey(k)) {
    heldDriveKeys.delete(k);
    if (heldDriveKeys.size === 0) stopManualSending();
    e.preventDefault();
  }
});
addEventListener('blur', () => {
  heldDriveKeys.clear();
  stopManualSending();
});

// ── World → Screen ──
function w2s(wx, wy) {
  return [
    C.width/2  + (wx - cam.x) * cam.zoom,
    C.height/2 - (wy - cam.y) * cam.zoom   // flip Y
  ];
}

// ── Fetch ──
async function fetchOdom() {
  try {
    const [odomRes, stateRes] = await Promise.all([
      fetch(API + '/odom'),
      fetch(API + '/get_state'),
    ]);
    const d = await odomRes.json();
    const s = await stateRes.json();
    odom = d;
    odom.state = s.state || d.state || 'IDLE';
    trail.push({x:d.x, y:d.y});
    if (trail.length > MAX_TRAIL) trail.shift();
    connected = true;
  } catch(e) { connected = false; }
}

async function fetchLine() {
  try {
    const r = await fetch(API + '/racing_line');
    const d = await r.json();
    if (d.points) racingLine = d.points;
  } catch(e) {}
}

async function fetchMpcStatus() {
  try {
    const r = await fetch(API + '/mpc_status');
    mpcStatus = await r.json();
  } catch(e) { mpcStatus = null; }
  renderCosts();
  renderResidual();
}

const RES_SPARK_MAX = 120;
const resEsHistory = [];

async function setResidualMode(mode) {
  const btn = document.getElementById('res-btn-' + mode);
  try {
    const r = await fetch(API + '/mpc/residual_mode', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mode}),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch(e) {
    console.error('residual_mode failed', e);
    if (btn) {
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 600);
    }
  }
}

function renderResidual() {
  const m = mpcStatus;
  const modeNum = (m && Number.isFinite(m.residual_mode_num)) ? (m.residual_mode_num | 0) : 0;
  const modeLabel = modeNum === 2 ? 'APPLY' : modeNum === 1 ? 'SHADOW' : 'OFF';
  const modeEl = document.getElementById('res-mode');
  modeEl.textContent = modeLabel;
  modeEl.className = 'mode ' + modeLabel;

  for (const k of ['off', 'shadow', 'apply']) {
    const b = document.getElementById('res-btn-' + k);
    if (b) b.classList.toggle('active', k === modeLabel.toLowerCase());
  }

  if (!m || !m.received) {
    document.getElementById('res-samples').textContent = '—';
    document.getElementById('res-theta-s').textContent = '—';
    document.getElementById('res-theta-d').textContent = '—';
    document.getElementById('res-ds-nom').textContent = '—';
    document.getElementById('res-ds-res').textContent = '—';
    document.getElementById('res-ds-res').className = '';
    document.getElementById('res-dd-nom').textContent = '—';
    document.getElementById('res-dd-res').textContent = '—';
    document.getElementById('res-dd-res').className = '';
    drawResSparkline();
    return;
  }

  const num = (v, d = 0) => Number.isFinite(v) ? +v : d;
  const samples = num(m.samples_trained) | 0;
  const thetaS  = num(m.theta_s_norm);
  const thetaD  = num(m.theta_d_norm);
  const nomS    = num(m.nom_s);
  const nomD    = num(m.nom_d);
  const resS    = num(m.res_es);
  const resD    = num(m.res_ed);

  document.getElementById('res-samples').textContent = samples.toString();
  document.getElementById('res-theta-s').textContent = thetaS.toFixed(2);
  document.getElementById('res-theta-d').textContent = thetaD.toFixed(2);

  document.getElementById('res-ds-nom').textContent = nomS.toFixed(3);
  const dsRes = document.getElementById('res-ds-res');
  dsRes.textContent = resS.toFixed(3);
  dsRes.className = resS < nomS ? 'err-better' : resS > nomS ? 'err-worse' : '';

  document.getElementById('res-dd-nom').textContent = nomD.toFixed(3);
  const ddRes = document.getElementById('res-dd-res');
  ddRes.textContent = resD.toFixed(3);
  ddRes.className = resD < nomD ? 'err-better' : resD > nomD ? 'err-worse' : '';

  resEsHistory.push(resS);
  if (resEsHistory.length > RES_SPARK_MAX) resEsHistory.shift();
  drawResSparkline();
}

const PLANNERS = ['pure_pursuit', 'mpc', 'opencv'];
let currentPlanner = null;   // unknown until first click — backend doesn't expose this

async function setPlanner(planner) {
  const btn = document.getElementById('plan-btn-' + planner);
  try {
    const r = await fetch(API + '/pathfinder/planner', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({planner}),
    });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(body.error || ('HTTP ' + r.status));
    currentPlanner = (body.planner || planner);
    for (const p of PLANNERS) {
      const b = document.getElementById('plan-btn-' + p);
      if (b) b.classList.toggle('active', p === currentPlanner);
    }
  } catch(e) {
    console.error('setPlanner failed', e);
    if (btn) {
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 600);
    }
  }
}

let lineStatusTimeout = null;
function showLineStatus(text, kind) {
  const el = document.getElementById('line-status');
  if (!el) return;
  el.textContent = text;
  el.className = 'line-status ' + (kind || '');
  if (lineStatusTimeout) clearTimeout(lineStatusTimeout);
  lineStatusTimeout = setTimeout(() => {
    el.textContent = '';
    el.className = 'line-status';
  }, 3000);
}

async function loadLine() {
  const input = document.getElementById('line-input');
  const select = document.getElementById('line-select');
  const typed = (input.value || '').trim();
  const path = typed || select.value;
  if (!path) {
    showLineStatus('no path selected', 'err');
    return;
  }
  try {
    const r = await fetch(API + '/pathfinder/line_path', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path}),
    });
    const body = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(body.error || ('HTTP ' + r.status));
    const used = body.path || path;
    const base = used.split('/').pop();
    showLineStatus('loaded ' + base, 'ok');
    // Pick up the new line on the next /racing_line poll so the viz redraws.
    fetchLine();
  } catch(e) {
    console.error('loadLine failed', e);
    showLineStatus(String(e.message || e), 'err');
  }
}

function drawResSparkline() {
  const cv = document.getElementById('res-spark');
  if (!cv) return;
  const sctx = cv.getContext('2d');
  const w = cv.width, h = cv.height;
  sctx.clearRect(0, 0, w, h);
  if (resEsHistory.length < 2) return;
  let mx = 0;
  for (const v of resEsHistory) if (v > mx) mx = v;
  if (mx < 1e-9) mx = 1;
  sctx.beginPath();
  sctx.strokeStyle = '#60a5fa';
  sctx.lineWidth = 1;
  const n = resEsHistory.length;
  for (let i = 0; i < n; i++) {
    const x = (i / Math.max(1, RES_SPARK_MAX - 1)) * w;
    const y = h - 1 - (resEsHistory[i] / mx) * (h - 2);
    if (i === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
  }
  sctx.stroke();
}

async function fetchLines() {
  try {
    const r = await fetch(API + '/lines');
    const d = await r.json();
    dynamicLine = d.dynamic || null;
  } catch(e) { dynamicLine = null; }
}

// Display order roughly groups: line-tracking, speed, control, safety, reward.
const COST_ROWS = [
  ['d',                'lateral d',     '#60a5fa'],
  ['terminal_d',       'term d',        '#60a5fa'],
  ['heading',          'heading',       '#a78bfa'],
  ['terminal_heading', 'term heading',  '#a78bfa'],
  ['speed',            'speed err',     '#facc15'],
  ['delta',            'steer',         '#fb923c'],
  ['drate',            'steer rate',    '#fb923c'],
  ['accel',            'accel',         '#fb923c'],
  ['edge',             'edge (inner)',  '#fb7185'],
  ['boundary',         'corridor',      '#f87171'],
  ['a_lat',            'a_lat',         '#f87171'],
  ['progress',         'progress',      '#4ade80'],  // negative = reward
];

function renderCosts() {
  const meta = document.getElementById('cost-meta');
  const tbody = document.querySelector('#cost-table tbody');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  if (!mpcStatus || !mpcStatus.received) {
    meta.textContent = 'no MPC status yet (run AUTO with planner=mpc)';
    return;
  }
  const c = mpcStatus.costs || {};
  let maxAbs = 0;
  for (const [k] of COST_ROWS) maxAbs = Math.max(maxAbs, Math.abs(c[k] || 0));
  if (maxAbs < 1e-9) maxAbs = 1;

  const total = mpcStatus.cost_total || 0;
  const mode = mpcStatus.mode === 2 ? 'FAILSAFE' : 'NORMAL';
  const ok = mpcStatus.success ? 'ok' : 'infeasible';
  meta.textContent =
    `${mode} · ${ok} · solve ${mpcStatus.solve_ms.toFixed(1)}ms · total ${total.toFixed(0)} · |d|=${Math.abs(mpcStatus.d).toFixed(2)}m`;

  for (const [k, label, color] of COST_ROWS) {
    const v = c[k] || 0;
    const pct = (Math.abs(v) / maxAbs) * 100;
    const sign = v < 0 ? '−' : '';

    const tr = document.createElement('tr');

    const tdName = document.createElement('td');
    tdName.className = 'name';
    tdName.textContent = label;

    const tdBar = document.createElement('td');
    tdBar.className = 'bar';
    const fill = document.createElement('div');
    fill.className = 'barfill' + (v < 0 ? ' neg' : '');
    fill.style.width = pct.toFixed(1) + '%';
    fill.style.background = color;
    tdBar.appendChild(fill);

    const tdVal = document.createElement('td');
    tdVal.className = 'val';
    tdVal.textContent = sign + Math.abs(v).toFixed(1);

    tr.appendChild(tdName);
    tr.appendChild(tdBar);
    tr.appendChild(tdVal);
    tbody.appendChild(tr);
  }
}

// ── Draw ──
function draw() {
  requestAnimationFrame(draw);

  // Smooth zoom
  cam.zoom += (cam.targetZoom - cam.zoom) * 0.15;

  // Auto-follow if not dragging
  if (!dragging) {
    cam.x += (odom.x - cam.x) * 0.05;
    cam.y += (odom.y - cam.y) * 0.05;
  }

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, C.width, C.height);

  // Grid
  drawGrid();

  // Racing line
  if (racingLine.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = '#1a2a3a';
    ctx.lineWidth = Math.max(1, 2 * cam.zoom);
    ctx.setLineDash([8, 6]);
    let [sx, sy] = w2s(racingLine[0][0], racingLine[0][1]);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < racingLine.length; i++) {
      [sx, sy] = w2s(racingLine[i][0], racingLine[i][1]);
      ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Bezier rejoin overlay (when active — this is what MPC is actually tracking)
  if (dynamicLine && dynamicLine.active && dynamicLine.points && dynamicLine.points.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = Math.max(2, 2.5 * cam.zoom);
    let [bx, by] = w2s(dynamicLine.points[0][0], dynamicLine.points[0][1]);
    ctx.moveTo(bx, by);
    for (let i = 1; i < dynamicLine.points.length; i++) {
      [bx, by] = w2s(dynamicLine.points[i][0], dynamicLine.points[i][1]);
      ctx.lineTo(bx, by);
    }
    ctx.stroke();
  }

  // Trail (gradient fade)
  if (trail.length > 1) {
    for (let i = 1; i < trail.length; i++) {
      const alpha = (i / trail.length) * 0.7;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(96,165,250,${alpha})`;
      ctx.lineWidth = Math.max(1, 1.5);
      const [x0, y0] = w2s(trail[i-1].x, trail[i-1].y);
      const [x1, y1] = w2s(trail[i].x, trail[i].y);
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
    }
  }

  // Kart
  drawKart(odom.x, odom.y, odom.yaw);

  // HUD
  updateHUD();
}

function drawGrid() {
  const step = cam.zoom > 8 ? 5 : cam.zoom > 2 ? 10 : cam.zoom > 0.8 ? 50 : 100;
  ctx.strokeStyle = '#111118';
  ctx.lineWidth = 0.5;
  // Visible world bounds
  const wLeft   = cam.x - C.width / 2 / cam.zoom;
  const wRight  = cam.x + C.width / 2 / cam.zoom;
  const wBottom = cam.y - C.height / 2 / cam.zoom;
  const wTop    = cam.y + C.height / 2 / cam.zoom;
  const x0 = Math.floor(wLeft / step) * step;
  const y0 = Math.floor(wBottom / step) * step;
  for (let wx = x0; wx <= wRight; wx += step) {
    const [sx] = w2s(wx, 0);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, C.height); ctx.stroke();
  }
  for (let wy = y0; wy <= wTop; wy += step) {
    const [, sy] = w2s(0, wy);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(C.width, sy); ctx.stroke();
  }
}

function drawKart(x, y, yaw) {
  const [sx, sy] = w2s(x, y);
  const len = Math.max(12, 1.05 * cam.zoom * 2);  // wheelbase-ish
  const wid = len * 0.5;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(-yaw);  // canvas Y is flipped

  // Body
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.moveTo(len * 0.6, 0);            // nose
  ctx.lineTo(-len * 0.4, -wid * 0.5);  // rear left
  ctx.lineTo(-len * 0.3, 0);           // rear center notch
  ctx.lineTo(-len * 0.4, wid * 0.5);   // rear right
  ctx.closePath();
  ctx.fill();

  // Direction indicator
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(len * 0.35, 0, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function updateHUD() {
  const st = document.getElementById('h-state');
  st.textContent = odom.state || 'IDLE';
  st.className = 'state ' + (odom.state || 'IDLE');

  document.getElementById('h-pos').textContent = `${odom.x.toFixed(1)}, ${odom.y.toFixed(1)}`;
  document.getElementById('h-yaw').textContent = `${(odom.yaw * 180 / Math.PI).toFixed(1)}°`;
  document.getElementById('h-spd').textContent = `${odom.speed.toFixed(2)} m/s`;
  document.getElementById('h-cmd').textContent = `M:${(odom.motor||0).toFixed(0)}% S:${(odom.steer||0).toFixed(1)}°`;

  const s = document.getElementById('status');
  s.textContent = connected ? 'connected' : 'disconnected';
  s.className = connected ? 'ok' : 'err';
}
async function setState(state) {
  try {
    await fetch(API + '/set_state', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({state}),
    });
  } catch(e) { console.error('setState failed', e); }
}

// ── Init ──
fetchLine();
setInterval(fetchOdom, 50);          // 20Hz polling
setInterval(fetchLine, 5000);        // refresh line occasionally
setInterval(fetchMpcStatus, 100);    // 10Hz MPC cost breakdown
setInterval(fetchLines, 200);        // 5Hz dynamic-line (bezier rejoin) overlay
draw();
</script>
