name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  colcon-test:
    name: colcon build + test (devcontainer image)
    runs-on: ubuntu-24.04
    # Run every step inside the same image the devcontainer uses so rclpy,
    # cv_bridge, OpenCV, and every ROS dep are preinstalled.
    container:
      image: ghcr.io/evc-purdue/ros2-humble-dev:main
      options: --user root
    env:
      WS: /ws
      ROS_DISTRO: humble
      ROS_DOMAIN_ID: "77"
      ROS_LOCALHOST_ONLY: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ws-src

      - name: Stage workspace source at /ws
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /ws/src /ws/data /ws/scripts
          # cp -a preserves symlinks/perms and works in minimal images that
          # don't ship rsync. The trailing /. copies directory contents
          # rather than nesting the directory under itself.
          cp -a "${GITHUB_WORKSPACE}/ws-src/src/." /ws/src/
          cp -a "${GITHUB_WORKSPACE}/ws-src/data/." /ws/data/
          cp -a "${GITHUB_WORKSPACE}/ws-src/scripts/." /ws/scripts/
          cp -a "${GITHUB_WORKSPACE}/ws-src/requirements.txt" /ws/requirements.txt || true
          ls /ws

      - name: Restore colcon build cache
        id: colcon-cache
        uses: actions/cache@v4
        with:
          path: |
            /ws/build
            /ws/install
            /ws/log
          # Source hash intentionally excludes test/** so that test-only
          # changes reuse the previous colcon build instead of triggering
          # a full rebuild. Package metadata + non-test sources define
          # what needs recompiling.
          key: colcon-${{ runner.os }}-${{ hashFiles('ws-src/src/**/package.xml', 'ws-src/src/**/setup.py', 'ws-src/requirements.txt', 'ws-src/docker/Dockerfile') }}-${{ hashFiles('ws-src/src/**/*.py', '!ws-src/src/**/test/**') }}
          restore-keys: |
            colcon-${{ runner.os }}-${{ hashFiles('ws-src/src/**/package.xml', 'ws-src/src/**/setup.py', 'ws-src/requirements.txt', 'ws-src/docker/Dockerfile') }}-
            colcon-${{ runner.os }}-

      - name: Build
        shell: bash
        run: |
          set -exo pipefail
          source /opt/ros/humble/setup.bash
          cd /ws
          colcon build --packages-select autonomous_kart --symlink-install \
            --cmake-args -DBUILD_TESTING=ON

      - name: Run tests
        shell: bash
        run: |
          set -exo pipefail
          source /opt/ros/humble/setup.bash
          source /ws/install/setup.bash
          cd /ws
          colcon test \
            --packages-select autonomous_kart \
            --event-handlers console_direct+ \
            --pytest-args -rfEs --color=no
          colcon test-result --verbose

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-test-logs
          path: |
            /ws/log/latest_test
            /ws/build/autonomous_kart/test_results
          if-no-files-found: ignore
