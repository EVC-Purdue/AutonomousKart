# Planner configs including perception thresholds, toggles, etc.

/**:
  ros__parameters:
    v_max_mps: 20.0            # kart max speed (m/s)
    wheelbase_m: 1.05          # kart wheelbase in meters (rear axle -> front axle)
    steer_max_deg: 25.0        # physical max front-wheel steering angle (degrees)
    steer_rate_max_degps: 180.0 # max steering slew rate (degrees/second)
    a_max_mps2: 2.0            # max forward acceleration (m/s^2)
    a_min_mps2: -3.0           # max braking deceleration (m/s^2, negative)
    a_lat_max_mps2: 4.0        # max lateral acceleration before tires let go (m/s^2)

pathfinder_node:
  ros__parameters:
    # Options: mpc, opencv, pure_pursuit
    planner: pure_pursuit

    # Manual mode
    max_speed: 50
    acceleration: 0.2
    max_steering: 100
    steering_accel: 5.0

    pure_pursuit:
      use_velocity_scaled_lookahead: true  # Nav2: use_velocity_scaled_lookahead_dist
      lookahead_time_s: 0.6                # Nav2: lookahead_time (s)
      min_lookahead_m: 3.0                 # Nav2: min_lookahead_dist (m)
      max_lookahead_m: 8.0                 # Nav2: max_lookahead_dist (m)

      use_curvature_regulation: true       # Nav2: use_regulated_linear_velocity_scaling
      min_radius_m: 10.0                   # Nav2: regulated_linear_scaling_min_radius (m)
      min_reg_speed_pct: 0.20              # like regulated_linear_scaling_min_speed / v_max

      approach_dist_m: 1.0                 # Nav2: approach_velocity_scaling_dist (m)
      min_approach_speed_pct: 0.05         # like min_approach_linear_velocity / v_max

      search_window: 80                    # Bounded forward search window (number of waypoints)
      initial_sync_done: false             # First autonomous tick after pose_ready does an O(n) full-line nearest
      max_resync_dist: 80                  # Max allowed distance to race line (m) before falling back to a full O(n) search
      max_closed_dist: 2                   # Max distance between start and end for track to be considered closed (m)

      # Rejoin sub-strategy (pure_pursuit overlay)
      rejoin_cte_activate: 3.0
      rejoin_cte_deactivate: 1.0
      rejoin_merge_lookahead_m: 15.0

    opencv: { }

    mpc:
      # Solve
      horizon_steps: 20
      dt_s: 0.05 # rollout step

      # Sampling MPC
      num_samples: 48
      steer_sigma_deg: 6.0
      accel_sigma_mps2: 1.0
      proj_window_back: 5
      proj_window_fwd: 60
      frenet_v_window_s: 0.3 # finite-diff window for (v_s, v_d) from pose history

      # MPC-only speed shaping
      target_speed_pct: 0.30 # cruise as fraction of v_max_mps

      # Track corridor (centerline = racing line)
      track_half_width_m: 2.5
      safety_margin_m: 0.5
      kart_half_width_m: 0.5025

      # Costs
      w_d: 100.0
      w_heading: 30.0
      w_speed: 5.0
      w_delta: 5.0
      w_delta_rate: 50.0
      w_accel: 2.0
      w_boundary: 1000.0
      w_progress: 1.0
      w_terminal_d: 200.0
      w_terminal_heading: 100.0
      w_a_lat: 50.0                    # soft penalty on |a_lat| > lateral_accel_max_mps2

      # Rejoin mode (kart outside corridor)
      rejoin_activate_d_m: 2.5
      rejoin_deactivate_d_m: 1.0
      rejoin_v_max_mps: 2.0

      # Failsafe / feasibility
      max_consecutive_solver_failures: 3
      infeasible_cost: 1.0e9           # sentinel cost for corridor-violating rollouts (NORMAL mode)
      rejoin_terminal_penalty: 1.0e5   # added to plans that end outside the corridor in REJOIN
      feasibility_threshold: 5.0e8     # best_cost above this -> not feasible -> failsafe path

      # Residual learning
      residual:
        mode: shadow                   # off | shadow | apply
        target_horizon_s: 0.5
        forgetting_factor: 0.99
        initial_cov: 1000.0
        min_train_speed_mps: 0.5
        error_window: 200              # rolling window for nominal vs corrected error

    safety:
      enabled: true
