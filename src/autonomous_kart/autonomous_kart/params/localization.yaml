localization_node:
  ros__parameters:
    # EKF process-noise spectral densities (units per second).
    pos_noise: 0.01            # m^2/s, xy diffusion from unmodeled lateral motion
    yaw_drift_noise: 0.01      # rad^2/s, unmodeled yaw drift beyond gyro noise
    speed_drift_noise: 0.5     # (m/s)^2/s, absorbs accel bias / gravity-leak from chassis pitch

    # VTG validity gates
    vtg_yaw_var_max: 1.0       # rad^2
    vtg_speed_var_max: 100.0   # (m/s)^2

    gps_dropout_warn: 2.0      # s
    sigma_xy_floor: 0.02       # m

    # Wheel-speed (VESC) update variance
    # 2-sigma = 0.02 m/s
    wheel_speed_var: 1.0e-4    # (m/s)^2

    imu_dropout_warn: 1.0      # s

    # Sim-only noise + actuator delay
    sim_odom_rate_hz: 10.0             # /odom publish rate (Hz) matches real GPS cadence
    sim_noise_seed: 0                  # RNG seed (deterministic noise sequence)
    sim_actuator_delay_s: 0.20         # 200 ms
    sim_cmd_motor_noise_mps: 0.3       # std on throttle command (m/s)
    sim_cmd_steer_noise_deg: 1.0       # std on steering command (deg)
    sim_steer_slop_deg: 2.0            # mechanical backlash half-width (deg)
    sim_pos_noise_m: 0.03              # std on x, y output (m)
    sim_yaw_noise_deg: 0.5             # std on yaw output (deg)
    sim_speed_noise_mps: 0.05          # std on speed output (m/s)