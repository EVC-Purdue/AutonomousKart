# Actuator limits used by e_comms.convert.
# max_speed and the % <-> m/s conversion are derived from v_max_mps in
# pathfinder.yaml at runtime — see e_comms_node — so they live there.
e_comms_node:
  ros__parameters:
    min_speed: 0.0        # m/s
    max_steering: 100.0   # %
    min_steering: -100.0  # %
